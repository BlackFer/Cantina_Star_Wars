<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Star Wars — Central de Operaciones</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            font-family: 'Inter', sans-serif;
            background: #000;
            overflow: hidden;
            height: 100dvh;
            width: 100vw;
            -webkit-tap-highlight-color: transparent;
        }

        .bg-fallback {
            position: fixed; inset: 0;
            background: linear-gradient(135deg, #1a0a00 0%, #0d0500 40%, #1a1005 100%);
            z-index: -1;
        }
        .bg-cantina {
            position: fixed; inset: 0;
            background-image: url('https://z-cdn-media.chatglm.cn/files/8907831a-55ff-4227-b66f-a3b37322d029.png?auth_key=1883281105-5c6a21e5cd184f6a99b8cde22125c047-0-dbaf7c269b2e60e8e4277d8afdfcdbb4');
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            z-index: 0;
        }
        .bg-overlay {
            position: fixed; inset: 0;
            background: linear-gradient(180deg, rgba(0,0,0,0.60) 0%, rgba(0,0,0,0.40) 35%, rgba(0,0,0,0.55) 65%, rgba(0,0,0,0.85) 100%);
            z-index: 1;
        }

        .dust-particle {
            position: fixed;
            width: 2px; height: 2px;
            background: rgba(255, 200, 100, 0.4);
            border-radius: 50%;
            z-index: 2; pointer-events: none;
            animation: floatDust linear infinite;
            will-change: transform, opacity;
        }
        @keyframes floatDust {
            0%   { transform: translateY(0) translateX(0); opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: 1; }
            100% { transform: translateY(-100vh) translateX(40px); opacity: 0; }
        }

        .scanline {
            position: fixed; top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255,215,0,0.08), transparent);
            z-index: 3; pointer-events: none;
            animation: scanDown 6s linear infinite;
        }
        @keyframes scanDown { 0% { top: -2px; } 100% { top: 100vh; } }

        .muzzle-flash {
            position: fixed; inset: 0;
            background: radial-gradient(circle at var(--fx, 50%) var(--fy, 80%), rgba(255,215,0,0.12), transparent 50%);
            z-index: 5; pointer-events: none; opacity: 0;
            transition: opacity 0.15s;
        }
        .muzzle-flash.active { opacity: 1; transition: opacity 0s; }

        .content {
            position: relative; z-index: 10;
            height: 100dvh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 1.5rem 1rem;
        }

        .title-block {
            text-align: center;
            animation: hubFadeIn 1.5s ease-out 0.2s both;
            flex-shrink: 0;
        }
        .sw-title {
            font-size: clamp(2rem, 8vw, 5.5rem);
            font-weight: 700; letter-spacing: 0.12em;
            text-transform: uppercase; color: #FFD700;
            text-shadow: 0 0 20px rgba(255,215,0,0.5), 0 0 60px rgba(255,215,0,0.2), 0 2px 4px rgba(0,0,0,0.8);
            line-height: 1;
            animation: titleGlow 3s ease-in-out infinite alternate;
        }
        @keyframes titleGlow {
            0%   { text-shadow: 0 0 20px rgba(255,215,0,0.4), 0 0 60px rgba(255,215,0,0.15), 0 2px 4px rgba(0,0,0,0.8); }
            100% { text-shadow: 0 0 30px rgba(255,215,0,0.7), 0 0 80px rgba(255,215,0,0.3), 0 2px 4px rgba(0,0,0,0.8); }
        }
        .sw-subtitle {
            font-size: clamp(0.6rem, 1.8vw, 1.1rem);
            font-weight: 400; letter-spacing: 0.3em;
            text-transform: uppercase; color: rgba(255,215,0,0.6);
            margin-top: 0.6rem;
        }

        .hub-panel {
            margin-top: clamp(1.5rem, 4vh, 3rem);
            background: rgba(15,15,20,0.55);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255,215,0,0.15);
            border-radius: 16px;
            padding: clamp(1.25rem,3vw,2.5rem) clamp(1rem,4vw,3rem);
            display: flex; flex-direction: column; align-items: center;
            gap: clamp(0.75rem,2vw,1.25rem);
            box-shadow: 0 0 40px rgba(255,215,0,0.05), inset 0 1px 0 rgba(255,255,255,0.05);
            animation: hubFadeIn 1.5s ease-out 0.5s both;
            width: 100%; max-width: 400px; flex-shrink: 0;
        }
        @keyframes hubFadeIn {
            from { opacity: 0; transform: translateY(20px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }
        .hub-label {
            font-size: 0.6rem; font-weight: 600;
            letter-spacing: 0.25em; text-transform: uppercase;
            color: rgba(255,215,0,0.40); margin-bottom: 0.25rem;
        }

        .sw-btn {
            position: relative; display: flex; align-items: center;
            gap: 0.85rem; width: 100%; min-height: 56px;
            padding: 0.75rem 1rem;
            background: rgba(255,215,0,0.06);
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 12px; color: #f5f5f4;
            text-decoration: none;
            font-size: clamp(0.85rem,2.5vw,0.95rem);
            font-weight: 500; letter-spacing: 0.04em;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
            overflow: hidden;
            -webkit-user-select: none; user-select: none;
        }
        .sw-btn::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(255,215,0,0.15), transparent 60%);
            opacity: 0; transition: opacity 0.25s;
        }
        .sw-btn:hover::before { opacity: 1; }
        .sw-btn:hover {
            border-color: rgba(255,215,0,0.5);
            box-shadow: 0 0 25px rgba(255,215,0,0.15), 0 8px 30px rgba(0,0,0,0.4);
            transform: translateY(-2px); color: #FFD700;
        }
        .sw-btn:active {
            transform: translateY(0) scale(0.97);
            transition-duration: 0.06s;
            border-color: rgba(255,215,0,0.6);
        }
        .sw-btn .btn-icon {
            position: relative; z-index: 1;
            width: 40px; height: 40px; min-width: 40px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,215,0,0.1);
            border-radius: 10px; flex-shrink: 0;
            transition: background 0.25s;
        }
        .sw-btn:hover .btn-icon, .sw-btn:active .btn-icon { background: rgba(255,215,0,0.2); }
        .sw-btn .btn-text {
            position: relative; z-index: 1; flex: 1; min-width: 0;
        }
        .sw-btn .btn-text span {
            display: block; font-size: clamp(0.55rem,1.6vw,0.65rem);
            font-weight: 400; color: #78716c;
            letter-spacing: 0.05em; margin-top: 2px;
            transition: color 0.25s;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .sw-btn:hover .btn-text span { color: rgba(255,215,0,0.5); }
        .sw-btn .btn-arrow {
            position: relative; z-index: 1; flex-shrink: 0;
            opacity: 0.4; transition: all 0.25s;
        }
        .sw-btn:hover .btn-arrow {
            opacity: 1; transform: translateX(4px); color: #FFD700;
        }

        .start-overlay {
            position: fixed; inset: 0; z-index: 100;
            background: rgba(0,0,0,0.92);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            cursor: pointer; transition: opacity 0.8s ease;
            -webkit-user-select: none; user-select: none;
        }
        .start-overlay.hidden { opacity: 0; pointer-events: none; }
        .start-text {
            color: #FFD700;
            font-size: clamp(0.8rem,2.5vw,1rem);
            font-weight: 500; letter-spacing: 0.25em;
            text-transform: uppercase;
            animation: startPulse 2s ease-in-out infinite;
            padding: 0 1rem; text-align: center;
        }
        @keyframes startPulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
        .start-icon {
            margin-top: 1.25rem; color: rgba(255,215,0,0.4);
            animation: startPulse 2s ease-in-out infinite;
        }

        .bottom-bar {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
            padding: 0.75rem 1.25rem;
            padding-bottom: max(0.75rem, env(safe-area-inset-bottom));
            display: flex; justify-content: space-between; align-items: center;
            background: linear-gradient(to top, rgba(0,0,0,0.6), transparent);
        }
        .bottom-bar span {
            font-size: 0.55rem; letter-spacing: 0.12em;
            text-transform: uppercase; color: rgba(255,255,255,0.2);
        }

        @media (max-width: 380px) {
            .content { padding: 1rem 0.75rem; }
            .hub-panel { padding: 1rem 0.75rem; gap: 0.6rem; border-radius: 14px; }
            .sw-btn { gap: 0.65rem; padding: 0.65rem 0.75rem; min-height: 50px; }
            .sw-btn .btn-icon { width: 36px; height: 36px; min-width: 36px; border-radius: 8px; }
            .sw-btn .btn-icon svg { width: 16px; height: 16px; }
            .sw-btn .btn-arrow svg { width: 15px; height: 15px; }
            .sw-title { letter-spacing: 0.08em; }
            .sw-subtitle { letter-spacing: 0.2em; margin-top: 0.4rem; }
            .hub-label { font-size: 0.55rem; letter-spacing: 0.2em; }
        }
        @media (max-height: 500px) {
            .content { flex-direction: row; flex-wrap: wrap; justify-content: center; align-items: center; gap: 1rem; padding: 0.75rem 1.5rem; }
            .title-block { width: 100%; margin-top: 0; }
            .sw-title { font-size: clamp(1.5rem,5vw,2.5rem); }
            .sw-subtitle { margin-top: 0.3rem; }
            .hub-panel { margin-top: 0; flex-direction: row; flex-wrap: wrap; justify-content: center; gap: 0.6rem; padding: 1rem 1.25rem; max-width: 100%; }
            .hub-label { width: 100%; margin-bottom: 0; }
            .sw-btn { width: auto; min-width: 200px; flex: 1; max-width: 260px; min-height: 48px; }
            .sw-btn .btn-text span { display: none; }
            .bottom-bar { display: none; }
        }
        @media (min-width: 641px) and (max-width: 1024px) { .hub-panel { max-width: 380px; } }
        @media (min-width: 1025px) { .hub-panel { max-width: 400px; } }
    </style>
</head>
<body>

    <div class="bg-fallback"></div>
    <div class="bg-cantina"></div>
    <div class="bg-overlay"></div>
    <div class="scanline"></div>
    <div class="muzzle-flash" id="muzzleFlash"></div>
    <div id="dustContainer"></div>

    <div class="start-overlay" id="startOverlay">
        <div class="start-text">Toca para entrar</div>
        <div class="start-icon"><i data-lucide="radio" style="width:28px;height:28px;"></i></div>
    </div>

    <div class="content">
        <div class="title-block">
            <div class="sw-title">Star Wars</div>
            <div class="sw-subtitle">Central de Operaciones</div>
        </div>
        <div class="hub-panel">
            <div class="hub-label">— Selecciona tu destino —</div>
            <!-- Los href se rellenan dinámicamente desde el script para facilitar cambios -->
            <a id="linkPersonajes" href="#" class="sw-btn" onclick="playBlaster(event)">
                <div class="btn-icon"><i data-lucide="users" style="width:20px;height:20px;color:#FFD700;"></i></div>
                <div class="btn-text">Personajes<span>Explora héroes y villanos</span></div>
                <div class="btn-arrow"><i data-lucide="chevron-right" style="width:18px;height:18px;"></i></div>
            </a>
            <a id="linkReglas" href="#" class="sw-btn" onclick="playBlaster(event)">
                <div class="btn-icon"><i data-lucide="swords" style="width:20px;height:20px;color:#FFD700;"></i></div>
                <div class="btn-text">Reglas Básicas<span>Tácticas y estrategias</span></div>
                <div class="btn-arrow"><i data-lucide="chevron-right" style="width:18px;height:18px;"></i></div>
            </a>
            <a id="linkGenerador" href="#" class="sw-btn" onclick="playBlaster(event)">
                <div class="btn-icon"><i data-lucide="zap" style="width:20px;height:20px;color:#FFD700;"></i></div>
                <div class="btn-text">Generador de Armas<span>Diseña tu arsenal</span></div>
                <div class="btn-arrow"><i data-lucide="chevron-right" style="width:18px;height:18px;"></i></div>
            </a>
        </div>
    </div>

    <div class="bottom-bar">
        <span>Galaxia muy lejana v.1.0</span>
    </div>

    <script>
        // ======================================================
        // 🎯 CONFIGURACIÓN DE ARCHIVOS HTML (¡CAMBIA AQUÍ!)
        // ======================================================
        // Escribe el nombre exacto del archivo .html para cada sección.
        // Pueden ser archivos en la misma carpeta o rutas relativas.
        // Ejemplos:
        //   const archivoPersonajes = 'personajes.html';
        //   const archivoReglas    = 'reglas-basicas.html';
        //   const archivoGenerador = 'generador-armas.html';
        // ======================================================
        const archivoPersonajes = 'Creador_Personajes.html';
        const archivoReglas    = 'Reglas_Basicas_STAR.html';
        const archivoGenerador = 'generador-armas.html';
        // ======================================================

        // Asignar los href a los enlaces
        document.getElementById('linkPersonajes').setAttribute('href', archivoPersonajes);
        document.getElementById('linkReglas').setAttribute('href', archivoReglas);
        document.getElementById('linkGenerador').setAttribute('href', archivoGenerador);

        lucide.createIcons();

        let audioCtx = null;

        function getAC() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            return audioCtx;
        }

        // ============================================
        // PARTÍCULAS
        // ============================================
        (function() {
            const n = window.innerWidth < 768 ? 10 : 25;
            const c = document.getElementById('dustContainer');
            for (let i = 0; i < n; i++) {
                const p = document.createElement('div');
                p.className = 'dust-particle';
                p.style.left = Math.random()*100+'vw';
                p.style.top = (60+Math.random()*40)+'vh';
                p.style.animationDuration = (8+Math.random()*12)+'s';
                p.style.animationDelay = (Math.random()*10)+'s';
                const s = (1+Math.random()*2)+'px';
                p.style.width = s; p.style.height = s;
                p.style.opacity = 0.15+Math.random()*0.3;
                c.appendChild(p);
            }
        })();

        // ============================================
        // BLASTER
        // ============================================
        function playBlaster(e) {
            const ctx = getAC(), now = ctx.currentTime;
            const fl = document.getElementById('muzzleFlash');
            const r = e.currentTarget.getBoundingClientRect();
            fl.style.setProperty('--fx', ((r.left+r.width/2)/innerWidth*100)+'%');
            fl.style.setProperty('--fy', ((r.top+r.height/2)/innerHeight*100)+'%');

            const bs = ctx.sampleRate*0.15, nb = ctx.createBuffer(1,bs,ctx.sampleRate), d = nb.getChannelData(0);
            for (let i=0;i<bs;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(ctx.sampleRate*0.03));
            const ns = ctx.createBufferSource(); ns.buffer = nb;
            const bp = ctx.createBiquadFilter(); bp.type='bandpass';
            bp.frequency.setValueAtTime(3000,now); bp.frequency.exponentialRampToValueAtTime(400,now+0.12); bp.Q.value=1.5;
            const o = ctx.createOscillator(); o.type='sawtooth';
            o.frequency.setValueAtTime(1500,now); o.frequency.exponentialRampToValueAtTime(80,now+0.1);
            const og = ctx.createGain(); og.gain.setValueAtTime(0.3,now); og.gain.exponentialRampToValueAtTime(0.001,now+0.1);
            const mg = ctx.createGain(); mg.gain.setValueAtTime(0.6,now); mg.gain.exponentialRampToValueAtTime(0.001,now+0.15);
            ns.connect(bp); bp.connect(mg); o.connect(og); og.connect(mg); mg.connect(ctx.destination);
            fl.classList.add('active'); setTimeout(()=>fl.classList.remove('active'),80);
            ns.start(now); ns.stop(now+0.15); o.start(now); o.stop(now+0.12);
        }

        // ╔═══════════════════════════════════════════════╗
        // ║  🔊 HUECO PARA TU ARCHIVO MP3               ║
        // ║                                               ║
        // ║  1. Pon tu archivo MP3 en la misma carpeta    ║
        // ║     que este index.html                       ║
        // ║                                               ║
        // ║  2. Cambia el nombre de abajo por el tuyo:    ║
        // ║     Ejemplo: 'star-wars.mp3'                 ║
        // ║                                               ║
        // ║  3. Si lo tienes en una subcarpeta:           ║
        // ║     Ejemplo: 'musica/star-wars.mp3'          ║
        // ║                                               ║
        // ║  4. Si es una URL externa:                    ║
        // ║     Ejemplo: 'https://tu-servidor.com/cancion.mp3' ║
        // ╚═══════════════════════════════════════════════╝
        // ── Audio con diagnóstico visible ──
        const bgMusic = new Audio('audio.mp3');
        bgMusic.loop = true;
        bgMusic.volume = 0.4;

        // Mostrar un pequeño cartel si hay error
        bgMusic.addEventListener('error', function() {
            const errorMsg = document.createElement('div');
            errorMsg.innerText = '❌ Error al cargar el audio. Revisa que el archivo "Star_Wars.mp3" esté en la misma carpeta que este HTML.';
            errorMsg.style.position = 'fixed';
            errorMsg.style.bottom = '20px';
            errorMsg.style.left = '20px';
            errorMsg.style.background = 'rgba(200,0,0,0.9)';
            errorMsg.style.color = 'white';
            errorMsg.style.padding = '10px 15px';
            errorMsg.style.borderRadius = '8px';
            errorMsg.style.fontSize = '14px';
            errorMsg.style.zIndex = '9999';
            errorMsg.style.maxWidth = '90%';
            document.body.appendChild(errorMsg);
            setTimeout(() => errorMsg.remove(), 8000);
        });

        // ============================================
        // INICIO
        // ============================================
        const overlay = document.getElementById('startOverlay');
        function begin() {
            if (overlay.classList.contains('hidden')) return;
            overlay.classList.add('hidden');
            bgMusic.play().catch(function(){});
        }
        overlay.addEventListener('click', begin);
        overlay.addEventListener('touchend', function(e) { e.preventDefault(); begin(); });
        document.addEventListener('keydown', function h() { begin(); document.removeEventListener('keydown', h); });
    </script>
</body>
</html>
